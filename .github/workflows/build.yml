name: Build LaTeX PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-extra texlive-lang-chinese latex-cjk-all biber python3-pygments

      - name: Build PDF
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: build-a-bridge
          path: main.pdf